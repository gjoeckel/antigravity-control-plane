model_list:
  # --- Smart Group (Primary: Gemini Pro) ---
  - model_name: antigravity-smart
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_KEY_A
      rpm: 14
      tpm: 1000000
    
  # --- Fast Group (Failover & Basic Tasks) ---
  - model_name: antigravity-fast
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_KEY_B
      rpm: 14
      tpm: 1000000

  # --- Mock Group (Offline/Testing) ---
  - model_name: antigravity-mock
    litellm_params:
      model: openai/mock-model
      mock_response: "ACP Mock Response: Connection Successful. No tokens consumed."

router_settings:
  routing_strategy: simple-shuffle
  model_group_alias:
    "antigravity-smart": ["antigravity-fast"]

general_settings:
  master_key: sk-antigravity-admin
  database_url: "postgresql://litellm_admin:sk-antigravity-db-pass@localhost:5432/litellm_db"

litellm_settings:
  drop_params: true
  set_verbose: false
