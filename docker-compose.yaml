version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: acp-postgres
    environment:
      POSTGRES_DB: litellm_db
      POSTGRES_USER: litellm_admin
      POSTGRES_PASSWORD: sk-antigravity-db-pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm_admin -d litellm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
