<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Primary Control | v11.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --google-blue: #1a73e8; 
            --google-red: #d93025; 
            --google-green: #188038; 
            --google-yellow: #f9ab00;
            --bg-gray: #f8f9fa;
        }
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-gray); 
            color: #3c4043;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1, h2, h3, .google-sans { font-family: 'Google Sans', sans-serif; }
        .mono { font-family: 'Roboto Mono', monospace; }
        
        .google-card {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-shadow: none;
            transition: box-shadow 0.2s;
        }
        .google-card:hover {
            box-shadow: 0 1px 2px 0 rgba(60,64,67,.30), 0 1px 3px 1px rgba(60,64,67,.15);
        }

        .pulse-emerald { 
            box-shadow: 0 0 8px rgba(24, 128, 56, 0.6);
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        #chat-container {
            height: calc(100vh - 180px);
        }
        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .message-user {
            background-color: var(--google-blue);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-agent {
            background-color: white;
            color: #3c4043;
            border: 1px solid #dadce0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
    </style>
</head>
<body class="flex flex-col overflow-hidden">

    <nav class="bg-white border-b border-gray-200 px-4 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-emerald-600 pulse-emerald"></div>
            <h1 class="text-lg font-medium text-gray-800 tracking-tight">Primary <span class="text-blue-600">Control</span></h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="header-clock" class="text-[10px] mono text-gray-500 font-medium">--:--:-- UTC</span>
            <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold text-xs">G</div>
        </div>
    </nav>

    <div class="bg-white border-b border-gray-100 px-4 py-1.5 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <span id="status-label" class="text-[9px] font-bold uppercase tracking-wider text-emerald-700">Online</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-1">
                <i data-lucide="cpu" class="w-3 h-3 text-gray-400"></i>
                <span class="text-[9px] font-medium text-gray-500">M4 Ghost</span>
            </div>
            <div class="flex items-center gap-1">
                <i data-lucide="cloud" class="w-3 h-3 text-blue-500"></i>
                <span class="text-[9px] font-medium text-gray-500">Sentinel v1</span>
            </div>
        </div>
    </div>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-[#f1f3f4]">
        <div id="chat-messages" class="flex flex-col w-full">
            <div class="message-bubble message-agent">
                Welcome, George. <strong>Primary Control</strong> v11.3 is active.
            </div>
        </div>
    </main>

    <div class="bg-white border-t border-gray-200 p-3 pb-8 shrink-0">
        <form id="chat-form" class="flex gap-2 max-w-screen-md mx-auto">
            <div class="relative flex-1">
                <input type="text" id="user-input" placeholder="Message the Sentinel..." class="w-full bg-gray-100 border border-transparent focus:bg-white focus:border-blue-500 rounded-full px-5 py-3 text-sm outline-none transition-all">
            </div>
            <button type="submit" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white w-11 h-11 rounded-full flex items-center justify-center shadow-md active:scale-90 transition-all">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <script>
        const GATEWAY_URL = "https://litellm-gateway-319843614554.us-central1.run.app";
        const messagesContainer = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        function updateClock() {
            const now = new Date();
            document.getElementById('header-clock').textContent = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
        }
        setInterval(updateClock, 1000);
        updateClock();
        lucide.createIcons();

        async function checkBrain() {
            const dot = document.getElementById('status-dot');
            const label = document.getElementById('status-label');
            try {
                const start = Date.now();
                const res = await fetch(`${GATEWAY_URL}/health`);
                const latency = Date.now() - start;
                if (res.ok) {
                    dot.classList.add('bg-emerald-600', 'pulse-emerald');
                    label.textContent = `Online • ${latency}ms`;
                }
            } catch (e) { label.textContent = "Offline"; }
        }
        checkBrain();

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message-bubble ${role === 'user' ? 'message-user' : 'message-agent'}`;
            div.textContent = text;
            messagesContainer.appendChild(div);
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            userInput.value = '';
            try {
                const res = await fetch(`${GATEWAY_URL}/health`);
                if (res.ok) {
                    setTimeout(() => {
                        addMessage("Acknowledge. Mandate received. Processing through Cloud Gateway...", 'agent');
                    }, 600);
                }
            } catch (err) { addMessage("Error: Gateway unreachable.", 'agent'); }
        });
    </script>
</body>
</html>
