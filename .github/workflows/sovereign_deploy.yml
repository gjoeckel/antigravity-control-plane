name: Sovereign Forge — ACP Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sovereign-forge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Package VS Code Extension ──────────────────────────────────────
  forge-extension:
    name: Build & Package ACP Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acp-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: acp-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install vsce & ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Package extension
        run: vsce package --no-dependencies -o acp-ui-${{ github.ref_name }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-ui-vsix-${{ github.sha }}
          path: acp-ui/acp-ui-*.vsix
          retention-days: 30

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: ovsx publish acp-ui-${{ github.ref_name }}.vsix --pat ${{ env.OVSX_PAT }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

  # ── Job 2: Build Functions & Deploy Firebase ───────────────────────────────
  forge-firebase:
    name: Build Functions & Deploy Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Functions dependencies
        working-directory: functions
        run: npm install

      - name: Build Functions (TypeScript → JS)
        working-directory: functions
        run: npm run build

      - name: Deploy to Firebase Hosting + Functions
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          channelId: live
          projectId: hazel-service-489900-f3
